<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match Overlay</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
        background: transparent;
        font-family: 'Segoe UI', Arial, sans-serif;
        color: black;
        overflow: hidden;
        width: max-content;
        height: max-content;
    }
    .match-title {
        font-size: 10px;
        font-weight: bold;
        background: rgba(255,255,255,0.4);
        padding: 1px 6px;
        border-radius: 2px;
        white-space: nowrap;
    }
    .container {
        display: flex;
        align-items: flex-start;
        justify-content: center;
        gap: 4px;
        flex-wrap: nowrap;
    }
    .team-column {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
    }
    .team-badge {
        font-size: 7px;
        font-weight: bold;
        background: rgba(0,0,0,0.15);
        padding: 0px 4px;
        border-radius: 3px;
        color: black;
    }
    .player-card {
        display: flex;
        align-items: center;
        gap: 3px;
        background: transparent;
        padding: 1px 2px;
        border-radius: 2px;
        white-space: nowrap;
    }
    .flag {
        width: 16px;
        height: 10px;
        flex-shrink: 0;
    }
    .player-name {
        font-size: 8px;
        font-weight: bold;
        padding: 0px 3px;
        border-radius: 2px;
        line-height: 1.2;
    }
    .elo {
        font-size: 7px;
        font-weight: normal;
        margin-left: 2px;
    }
    .civ {
        font-size: 7px;
        color: #333;
        margin-left: 2px;
    }
    .civ-icon {
        width: 14px;
        height: 14px;
        object-fit: contain;
        vertical-align: middle;
        margin-right: 2px;
    }
    .vs {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        font-size: 9px;
        font-weight: bold;
        padding: 0 2px;
        color: black;
        min-width: 24px;
    }
    .vs-score {
        font-size: 7px;
    }
</style>
</head>
<body>
<div id="app"></div>
<script>
    const COLORS = [
        '#0066cc','#dc3232','#009600','#ffd700',
        '#009688','#a050c8','#a0a0a0','#ff8c00'
    ];

    function getPlayerColor(index) {
        const i = parseInt(index);
        return (i >= 0 && i <= 7) ? COLORS[i] : '#b4b4b4';
    }

    function textColorForBg(bg) {
        const r = parseInt(bg.slice(1,3),16);
        const g = parseInt(bg.slice(3,5),16);
        const b = parseInt(bg.slice(5,7),16);
        return (r*0.299 + g*0.587 + b*0.114) > 160 ? 'black' : 'white';
    }

    function render(data) {
        const app = document.getElementById('app');
        if (!data || !data.slot_info) {
            app.innerHTML = '';
            return;
        }
        const players = data.slot_info;

        const teams = {};
        players.forEach(p => {
            const tid = p.teamID ?? -1;
            if (!teams[tid]) teams[tid] = [];
            teams[tid].push(p);
        });
        const teamIds = Object.keys(teams).sort((a,b)=>a-b);

        let html = `<div style="display: flex; justify-content: center; margin-bottom: 2px;">
            <div class="match-title">${data.lobby_name || ''}  •  ${data.map_name || 'Unknown'}  (type ${data.game_type || '?'})</div>
        </div>`;
        html += '<div class="container">';
        teamIds.forEach((tid, idx) => {
            const teamPlayers = teams[tid];
            html += `<div class="team-column">`;
            html += `<div class="team-badge">Team ${tid}</div>`;
            teamPlayers.forEach(p => {
                const country = (p.country || '').toLowerCase();
                const alias = p.alias || 'Unknown';
                const elo = p.elo || '---';
                const race = p.race_name || '';
                const color = getPlayerColor(p.scenario_player_index);
                const txtColor = textColorForBg(color);

                html += `
                    <div class="player-card">
                        <img class="flag" src="Flags/${country}.png" onerror="this.style.display='none'">
                        <span class="player-name" style="background-color:${color}; color:${txtColor};">${alias}</span>
                        <span class="elo">${elo}</span>
                        <span class="civ">
                            <img class="civ-icon" src="Civs/${race}.png" onerror="this.style.display='none'">${race}
                        </span>
                    </div>
                `;
            });
            html += `</div>`;
            if (idx < teamIds.length - 1) {
                html += `<div class="vs"><span>VS</span></div>`;
            }
        });
        html += '</div>';
        app.innerHTML = html;
    }

    // 1. Load initial data from the JSON file (so we always show something)
    async function fetchInitial() {
        try {
            const resp = await fetch('player_stats.json?' + Date.now());
            if (resp.ok) {
                const data = await resp.json();
                render(data);
            }
        } catch(e) {
            console.log('Could not fetch player_stats.json, waiting for WebSocket...');
        }
    }
    fetchInitial();

    // 2. WebSocket for real‑time updates
    let ws;
    function connectWebSocket() {
        ws = new WebSocket('ws://localhost:8765');
        ws.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                render(data);
            } catch(e) {
                console.error('Invalid JSON from WebSocket');
            }
        };
        ws.onclose = () => {
            setTimeout(connectWebSocket, 2000);
        };
        ws.onerror = () => {
            ws.close();
        };
    }
    connectWebSocket();
</script>
</body>
</html>
